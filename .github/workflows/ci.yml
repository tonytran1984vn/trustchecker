name: TrustChecker CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: trustchecker
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: trustchecker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax check all JS files
        run: |
          BROKEN=0
          for f in server/routes/*.js server/engines/*.js server/middleware/*.js server/events/*.js; do
            [ -f "$f" ] && ! node --check "$f" 2>/dev/null && echo "❌ $f" && BROKEN=$((BROKEN+1))
          done
          echo "Broken: $BROKEN"
          [ $BROKEN -gt 0 ] && exit 1
          echo "✅ All files pass syntax check"

      - name: Run tests
        env:
          DATABASE_URL: postgresql://trustchecker:testpass@localhost:5432/trustchecker_test
          JWT_SECRET: test-secret-key-for-ci
          ENCRYPTION_KEY: test-encryption-key-32ch!!
          NODE_ENV: test
        run: npm test

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Security audit
        run: npm audit --production --audit-level=high || true

  deploy:
    needs: [lint-and-test, security-audit]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy to production
        run: |
          echo "Deploy via SSH to production server"
          echo "TODO: Configure SSH key in GitHub Secrets"
          # ssh deploy@tonytran.work "cd /opt/trustchecker && git pull && npm ci && pm2 restart trustchecker"
