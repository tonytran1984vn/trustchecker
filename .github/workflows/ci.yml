# TrustChecker CI/CD Pipeline
name: CI/CD

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: trustchecker_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/trustchecker_test
      NODE_ENV: test
      JWT_SECRET: test-jwt-secret-ci
      ENCRYPTION_KEY: test-encryption-key-32chars-ci-test!
      DISABLE_RATE_LIMIT: 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint server/ --max-warnings=800 || echo "Lint warnings found"

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Push DB schema
        run: npx prisma db push --accept-data-loss

      - name: Run tests with coverage
        run: npm test -- --forceExit --detectOpenHandles --passWithNoTests --coverage

  deploy:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push' && always()
    timeout-minutes: 5

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -e
            cd /opt/trustchecker

            # Save current commit for rollback
            PREV_COMMIT=$(git rev-parse HEAD)
            echo "Previous commit: $PREV_COMMIT"

            # Pull latest
            git pull origin master
            npm ci --production
            npx prisma generate

            # Restart with health check
            pm2 restart trustchecker
            sleep 20

            # Health check with rollback on failure
            if curl -sf http://localhost:4000/healthz > /dev/null 2>&1; then
              echo "✅ Deploy successful ($(git rev-parse --short HEAD))"
            else
              echo "❌ Health check failed — rolling back to $PREV_COMMIT"
              git checkout $PREV_COMMIT
              npm ci --production
              npx prisma generate
              pm2 restart trustchecker
              sleep 15
              curl -sf http://localhost:4000/healthz || echo "⚠️ Rollback also failed"
              exit 1
            fi
