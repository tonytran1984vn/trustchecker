# TrustChecker E2E Tests (Playwright)
name: E2E Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: trustchecker_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/trustchecker_test
      NODE_ENV: test
      JWT_SECRET: test-jwt-secret-ci
      DISABLE_RATE_LIMIT: 'true'
      TEST_URL: http://localhost:4000

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Setup database
        run: |
          npx prisma generate
          npx prisma db push --accept-data-loss

      - name: Start server
        run: |
          node server/index.js &
          sleep 5
          curl -sf http://localhost:4000/healthz || exit 1

      - name: Run E2E tests
        run: npx playwright test --reporter=github

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
