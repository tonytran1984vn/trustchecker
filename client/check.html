<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrustChecker — Product Verification</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0a0a1a 0%, #0d1b2a 50%, #1b2838 100%);
      color: #e0e6ed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    .container {
      max-width: 480px;
      width: 100%;
      margin-top: 40px;
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo h1 {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #00d2ff, #00ffcc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .logo p {
      font-size: 0.85rem;
      color: #8899aa;
      margin-top: 4px;
    }
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 28px;
      backdrop-filter: blur(12px);
    }
    .status-bar {
      text-align: center;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-weight: 800;
      font-size: 1.1rem;
    }
    .status-bar.loading { background: rgba(0,210,255,0.1); color: #00d2ff; }
    .status-bar.valid { background: rgba(0,210,100,0.15); color: #00d264; }
    .status-bar.warning { background: rgba(255,165,0,0.15); color: #ffa500; }
    .status-bar.suspicious { background: rgba(255,51,102,0.15); color: #ff3366; }
    .status-bar.counterfeit { background: rgba(255,0,0,0.15); color: #ff0000; }
    .status-bar.error { background: rgba(255,51,102,0.1); color: #ff6b6b; }
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 20px;
    }
    .detail-item {
      padding: 12px;
      background: rgba(255,255,255,0.03);
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .detail-label {
      font-size: 0.7rem;
      color: #6b7b8d;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .detail-value {
      font-size: 0.9rem;
      font-weight: 600;
      color: #e0e6ed;
      word-break: break-all;
    }
    .trust-score {
      text-align: center;
      margin-top: 20px;
      padding: 20px;
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
    }
    .trust-number {
      font-size: 3rem;
      font-weight: 800;
    }
    .trust-label { font-size: 0.75rem; color: #6b7b8d; }
    .fraud-bar {
      margin-top: 16px;
      background: rgba(255,255,255,0.06);
      border-radius: 8px;
      height: 8px;
      overflow: hidden;
    }
    .fraud-bar .fill {
      height: 100%;
      border-radius: 8px;
      transition: width 0.6s ease;
    }
    .footer {
      text-align: center;
      margin-top: 32px;
      font-size: 0.72rem;
      color: #4a5568;
    }
    .footer a { color: #00d2ff; text-decoration: none; }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(0,210,255,0.2);
      border-top-color: #00d2ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>🛡️ TrustChecker</h1>
      <p>Digital Trust Infrastructure — Product Verification</p>
    </div>
    <div class="card" id="result-card">
      <div class="status-bar loading" id="status-bar">
        <div class="spinner"></div>
        Verifying product authenticity...
      </div>
    </div>
    <div class="footer">
      Powered by <a href="/">TrustChecker</a> — Blockchain-sealed verification
    </div>
  </div>

  <script>
    (async function() {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      const card = document.getElementById('result-card');
      const bar = document.getElementById('status-bar');

      if (!code) {
        bar.className = 'status-bar error';
        bar.innerHTML = '❌ No verification code provided';
        return;
      }

      try {
        // First try: look up as-is (the QR code stores the full URL as qr_data)
        const fullQrData = window.location.href;
        const resp = await fetch('/api/qr/public/check-by-code', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code })
        });

        if (!resp.ok) {
          const err = await resp.json();
          bar.className = 'status-bar counterfeit';
          bar.innerHTML = '❌ ' + (err.message || err.error || 'Product not found in TrustChecker registry');
          return;
        }

        const data = await resp.json();

        // Status
        const statusMap = {
          valid: ['✅ AUTHENTIC PRODUCT', 'valid'],
          warning: ['⚠️ PREVIOUSLY SCANNED', 'warning'],
          suspicious: ['⚠️ SUSPICIOUS — Verify Manually', 'suspicious'],
          counterfeit: ['❌ NOT RECOGNIZED', 'counterfeit'],
          blocked: ['🚫 QR CODE BLOCKED', 'suspicious'],
          expired: ['⏰ QR CODE EXPIRED', 'warning'],
        };
        const [msg, cls] = statusMap[data.result] || ['ℹ️ ' + (data.message || data.result), 'loading'];
        bar.className = 'status-bar ' + cls;
        bar.innerHTML = msg + (data.message ? '<br><span style="font-size:0.78rem;font-weight:400;opacity:0.85">' + data.message + '</span>' : '');

        // Product details
        if (data.product) {
          const p = data.product;
          const trustColor = (p.trust_score || 0) >= 80 ? '#00d264' : (p.trust_score || 0) >= 50 ? '#ffa500' : '#ff3366';
          card.innerHTML += `
            <div class="detail-grid">
              <div class="detail-item"><div class="detail-label">Product</div><div class="detail-value">${p.name || '—'}</div></div>
              <div class="detail-item"><div class="detail-label">SKU</div><div class="detail-value" style="font-family:monospace">${p.sku || '—'}</div></div>
              <div class="detail-item"><div class="detail-label">Manufacturer</div><div class="detail-value">${p.manufacturer || '—'}</div></div>
              <div class="detail-item"><div class="detail-label">Origin</div><div class="detail-value">${p.origin_country || '—'}</div></div>
            </div>
            <div class="trust-score">
              <div class="trust-number" style="color:${trustColor}">${Math.round(p.trust_score || 0)}</div>
              <div class="trust-label">Trust Score</div>
            </div>
          `;
          if (data.fraud_score !== undefined) {
            const fraudPct = Math.round((data.fraud_score || 0) * 100);
            const fraudColor = fraudPct > 50 ? '#ff3366' : fraudPct > 20 ? '#ffa500' : '#00d264';
            card.innerHTML += `
              <div style="margin-top:16px">
                <div style="display:flex;justify-content:space-between;font-size:0.75rem;margin-bottom:4px">
                  <span style="color:#6b7b8d">Fraud Risk</span>
                  <span style="color:${fraudColor};font-weight:700">${fraudPct}%</span>
                </div>
                <div class="fraud-bar"><div class="fill" style="width:${fraudPct}%;background:${fraudColor}"></div></div>
              </div>
            `;
          }
        }
      } catch (e) {
        bar.className = 'status-bar error';
        bar.innerHTML = '❌ Verification service unavailable. Please try again later.';
      }
    })();
  </script>
</body>
</html>
