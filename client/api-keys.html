<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Keys — TrustChecker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #0a0e17;
    --surface: #111827;
    --surface-2: #1a2332;
    --border: #1e293b;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --accent: #3b82f6;
    --accent-glow: rgba(59, 130, 246, 0.15);
    --success: #10b981;
    --danger: #ef4444;
    --warning: #f59e0b;
    --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
}
.container { max-width: 960px; margin: 0 auto; }
h1 {
    font-size: 28px; font-weight: 700;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
}
.subtitle { color: var(--text-dim); font-size: 14px; margin-bottom: 32px; }

/* ── Cards ────────────────────────────────────── */
.card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 20px;
    backdrop-filter: blur(12px);
    transition: border-color 0.2s;
}
.card:hover { border-color: rgba(59,130,246,0.3); }
.card-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 20px;
}
.card-title { font-size: 18px; font-weight: 600; }

/* ── Buttons ──────────────────────────────────── */
.btn {
    padding: 10px 20px; border: none; border-radius: 8px;
    font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all 0.2s; display: inline-flex;
    align-items: center; gap: 8px;
}
.btn-primary {
    background: linear-gradient(135deg, #3b82f6, #2563eb);
    color: white; box-shadow: 0 4px 12px rgba(37,99,235,0.3);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(37,99,235,0.4); }
.btn-danger { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
.btn-danger:hover { background: rgba(239,68,68,0.25); }
.btn-ghost { background: transparent; color: var(--text-dim); }
.btn-ghost:hover { color: var(--text); background: var(--surface-2); }
.btn-sm { padding: 6px 12px; font-size: 12px; }

/* ── Form ─────────────────────────────────────── */
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 13px; font-weight: 500; color: var(--text-dim); margin-bottom: 6px; }
.form-input, .form-select {
    width: 100%; padding: 10px 14px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px;
    transition: border-color 0.2s;
}
.form-input:focus, .form-select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

/* ── Table ─────────────────────────────────────── */
.key-table { width: 100%; border-collapse: collapse; }
.key-table th {
    text-align: left; padding: 12px 16px; font-size: 12px;
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--text-dim); border-bottom: 1px solid var(--border);
}
.key-table td { padding: 14px 16px; border-bottom: 1px solid var(--border); font-size: 14px; }
.key-table tr:hover td { background: var(--surface-2); }
.key-table tr:last-child td { border-bottom: none; }

/* ── Badges ────────────────────────────────────── */
.badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
}
.badge-active { background: rgba(16,185,129,0.15); color: #10b981; }
.badge-revoked { background: rgba(239,68,68,0.15); color: #ef4444; }
.badge-expired { background: rgba(245,158,11,0.15); color: #f59e0b; }
.badge-scope { background: rgba(59,130,246,0.1); color: #60a5fa; margin: 2px; }

/* ── Key Display ──────────────────────────────── */
.key-display {
    background: var(--bg); border: 1px solid var(--success);
    border-radius: 8px; padding: 16px; margin: 16px 0;
    position: relative;
}
.key-display code {
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
    color: var(--success); word-break: break-all;
}
.key-display .copy-btn {
    position: absolute; right: 12px; top: 12px;
    background: rgba(16,185,129,0.15); border: none; color: var(--success);
    padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px;
}
.key-display .copy-btn:hover { background: rgba(16,185,129,0.3); }
.key-warning { color: var(--warning); font-size: 12px; margin-top: 8px; display: flex; align-items: center; gap: 6px; }

/* ── Modal ─────────────────────────────────────── */
.modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px); display: none; align-items: center;
    justify-content: center; z-index: 1000;
}
.modal-overlay.active { display: flex; }
.modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px; width: 90%; max-width: 480px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    animation: slideUp 0.3s ease;
}
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } }
.modal h2 { font-size: 20px; margin-bottom: 20px; }

/* ── Empty State ──────────────────────────────── */
.empty-state {
    text-align: center; padding: 48px; color: var(--text-dim);
}
.empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
.empty-state p { font-size: 14px; }

/* ── Toast ─────────────────────────────────────── */
.toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 20px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    font-size: 14px; display: none; z-index: 2000;
    animation: slideIn 0.3s ease;
}
.toast.success { border-color: var(--success); }
.toast.error { border-color: var(--danger); }
@keyframes slideIn { from { opacity: 0; transform: translateX(20px); } }

/* ── Login ─────────────────────────────────────── */
.login-container {
    max-width: 400px; margin: 80px auto;
}

/* ── Stats ─────────────────────────────────────── */
.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
.stat-card {
    background: var(--surface-2); border-radius: 10px; padding: 16px;
    text-align: center;
}
.stat-value { font-size: 28px; font-weight: 700; color: var(--accent); }
.stat-label { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

@media (max-width: 640px) {
    .stats-row { grid-template-columns: 1fr; }
    .key-table th:nth-child(3), .key-table td:nth-child(3),
    .key-table th:nth-child(4), .key-table td:nth-child(4) { display: none; }
}
</style>
</head>
<body>

<!-- Login Screen -->
<div id="loginScreen" class="container login-container">
    <h1>🔑 API Keys</h1>
    <p class="subtitle">Sign in to manage your API keys</p>
    <div class="card">
        <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" id="loginEmail" class="form-input" placeholder="owner@tonyisking.com">
        </div>
        <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" id="loginPassword" class="form-input" placeholder="••••••••">
        </div>
        <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px" onclick="login()">Sign In</button>
    </div>
</div>

<!-- Main App -->
<div id="mainApp" class="container" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <h1>🔑 API Keys</h1>
        <button class="btn btn-ghost btn-sm" onclick="logout()">Sign Out</button>
    </div>
    <p class="subtitle">Manage API keys for external integrations. Keys use SHA-256 hashing — save them on creation.</p>

    <!-- Stats -->
    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-value" id="statTotal">0</div>
            <div class="stat-label">Total Keys</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="statActive" style="color:var(--success)">0</div>
            <div class="stat-label">Active</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="statRevoked" style="color:var(--danger)">0</div>
            <div class="stat-label">Revoked</div>
        </div>
    </div>

    <!-- Key List -->
    <div class="card">
        <div class="card-header">
            <span class="card-title">Your API Keys</span>
            <button class="btn btn-primary btn-sm" onclick="showCreateModal()">+ New Key</button>
        </div>
        <div id="keyList"></div>
    </div>

    <!-- New Key Display -->
    <div id="newKeyDisplay" class="card" style="display:none;border-color:var(--success)">
        <div class="card-title" style="color:var(--success);margin-bottom:12px">✅ API Key Created</div>
        <div class="key-display">
            <code id="newKeyValue"></code>
            <button class="copy-btn" onclick="copyKey()">📋 Copy</button>
        </div>
        <div class="key-warning">⚠️ This key will only be shown once. Save it now!</div>
    </div>
</div>

<!-- Create Modal -->
<div id="createModal" class="modal-overlay">
    <div class="modal">
        <h2>Create API Key</h2>
        <div class="form-group">
            <label class="form-label">Key Name *</label>
            <input type="text" id="keyName" class="form-input" placeholder="e.g. Production Integration">
        </div>
        <div class="form-group">
            <label class="form-label">Scopes</label>
            <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:6px">
                <label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer">
                    <input type="checkbox" value="read" checked> Read
                </label>
                <label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer">
                    <input type="checkbox" value="write"> Write
                </label>
                <label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer">
                    <input type="checkbox" value="products"> Products
                </label>
                <label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer">
                    <input type="checkbox" value="verification"> Verification
                </label>
                <label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer">
                    <input type="checkbox" value="trust"> Trust
                </label>
                <label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer">
                    <input type="checkbox" value="*"> All (*)
                </label>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">Expires In</label>
            <select id="keyExpiry" class="form-select">
                <option value="30">30 days</option>
                <option value="90">90 days</option>
                <option value="180">180 days</option>
                <option value="365" selected>1 year</option>
                <option value="730">2 years</option>
            </select>
        </div>
        <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:20px">
            <button class="btn btn-ghost" onclick="hideCreateModal()">Cancel</button>
            <button class="btn btn-primary" onclick="createKey()">Create Key</button>
        </div>
    </div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script>
const API = window.location.origin;
let token = localStorage.getItem('tc_token');

// ── Auth ──────────────────────────────────────────
async function login() {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    try {
        const res = await fetch(API + '/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        token = data.token || data.data?.token;
        if (!token) throw new Error('Login failed');
        localStorage.setItem('tc_token', token);
        showApp();
    } catch(e) { showToast('Login failed: ' + e.message, 'error'); }
}

function logout() {
    token = null;
    localStorage.removeItem('tc_token');
    document.getElementById('loginScreen').style.display = '';
    document.getElementById('mainApp').style.display = 'none';
}

function showApp() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = '';
    loadKeys();
}

// ── API Keys CRUD ──────────────────────────────────
async function loadKeys() {
    try {
        const res = await fetch(API + '/api/v1/api-keys', {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        if (res.status === 401) return logout();
        const json = await res.json();
        const keys = json.data || json || [];
        renderKeys(keys);
    } catch(e) {
        document.getElementById('keyList').innerHTML =
            '<div class="empty-state"><div class="icon">🔑</div><p>No API keys yet. Create your first key to get started.</p></div>';
    }
}

function renderKeys(keys) {
    const total = keys.length;
    const active = keys.filter(k => !k.revoked && (!k.expires_at || new Date(k.expires_at) > new Date())).length;
    const revoked = keys.filter(k => k.revoked).length;

    document.getElementById('statTotal').textContent = total;
    document.getElementById('statActive').textContent = active;
    document.getElementById('statRevoked').textContent = revoked;

    if (keys.length === 0) {
        document.getElementById('keyList').innerHTML =
            '<div class="empty-state"><div class="icon">🔑</div><p>No API keys yet. Create your first key to get started.</p></div>';
        return;
    }

    let html = '<table class="key-table"><thead><tr><th>Name</th><th>Key Prefix</th><th>Scopes</th><th>Last Used</th><th>Status</th><th></th></tr></thead><tbody>';
    for (const k of keys) {
        const isExpired = k.expires_at && new Date(k.expires_at) < new Date();
        const status = k.revoked ? '<span class="badge badge-revoked">Revoked</span>'
            : isExpired ? '<span class="badge badge-expired">Expired</span>'
            : '<span class="badge badge-active">Active</span>';

        const scopes = (k.scopes || []).map(s => '<span class="badge badge-scope">' + s + '</span>').join('');
        const lastUsed = k.last_used_at ? new Date(k.last_used_at).toLocaleDateString() : 'Never';

        html += '<tr><td><strong>' + (k.name || 'Unnamed') + '</strong><br><span style="font-size:11px;color:var(--text-dim)">Expires: ' +
            (k.expires_at ? new Date(k.expires_at).toLocaleDateString() : 'Never') + '</span></td>' +
            '<td><code style="font-family:JetBrains Mono,monospace;color:var(--accent)">' + (k.key_prefix || '???') + '...</code></td>' +
            '<td>' + (scopes || '<span style="color:var(--text-dim)">—</span>') + '</td>' +
            '<td style="color:var(--text-dim)">' + lastUsed + '</td>' +
            '<td>' + status + '</td>' +
            '<td>' + (k.revoked ? '' : '<button class="btn btn-danger btn-sm" onclick="revokeKey(\''+k.id+'\')">Revoke</button>') + '</td></tr>';
    }
    html += '</tbody></table>';
    document.getElementById('keyList').innerHTML = html;
}

async function createKey() {
    const name = document.getElementById('keyName').value.trim();
    if (!name) return showToast('Name is required', 'error');

    const checkboxes = document.querySelectorAll('#createModal input[type=checkbox]:checked');
    const scopes = Array.from(checkboxes).map(c => c.value);
    const expires_in_days = parseInt(document.getElementById('keyExpiry').value);

    try {
        const res = await fetch(API + '/api/v1/api-keys', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, scopes, expires_in_days })
        });
        const json = await res.json();
        const key = json.data || json;
        if (key.key) {
            document.getElementById('newKeyValue').textContent = key.key;
            document.getElementById('newKeyDisplay').style.display = '';
            hideCreateModal();
            loadKeys();
            showToast('API key created!', 'success');
        } else {
            showToast('Failed: ' + (json.error || 'Unknown error'), 'error');
        }
    } catch(e) { showToast('Error: ' + e.message, 'error'); }
}

async function revokeKey(id) {
    if (!confirm('Revoke this API key? This cannot be undone.')) return;
    try {
        await fetch(API + '/api/v1/api-keys/' + id, {
            method: 'DELETE',
            headers: { 'Authorization': 'Bearer ' + token }
        });
        loadKeys();
        showToast('Key revoked', 'success');
    } catch(e) { showToast('Error: ' + e.message, 'error'); }
}

function copyKey() {
    const key = document.getElementById('newKeyValue').textContent;
    navigator.clipboard.writeText(key).then(() => showToast('Copied to clipboard!', 'success'));
}

// ── UI Helpers ──────────────────────────────────
function showCreateModal() {
    document.getElementById('keyName').value = '';
    document.getElementById('createModal').classList.add('active');
}
function hideCreateModal() {
    document.getElementById('createModal').classList.remove('active');
}

function showToast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast ' + type;
    el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 3000);
}

// ── Init ──────────────────────────────────────────
document.addEventListener('keydown', e => {
    if (e.key === 'Escape') hideCreateModal();
    if (e.key === 'Enter' && document.getElementById('loginScreen').style.display !== 'none') login();
});

if (token) { showApp(); } else {
    document.getElementById('loginEmail').value = 'owner@tonyisking.com';
}
</script>
</body>
</html>
