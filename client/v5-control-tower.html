<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V5 Observability Control Tower</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root { 
    --bg: #09090b; --surface: #18181b; --surface2: #27272a; --border: #3f3f46;
    --primary: #3b82f6; --green: #10b981; --red: #ef4444; --amber: #f59e0b;
    --text: #f4f4f5; --text2: #a1a1aa; --text3: #71717a;
}
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 32px; min-height: 100vh; display: flex; flex-direction: column; gap: 24px; }
.header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 16px; }
.header h1 { font-size: 24px; font-weight: 700; background: linear-gradient(135deg, #e4e4e7, #71717a); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.bento { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; }
.card h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text2); margin-bottom: 20px; font-weight: 600; display: flex; justify-content: space-between;}
.controls { display: flex; gap: 12px; margin-bottom: 20px; }
input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 6px; font-family: monospace; }
button { background: var(--primary); color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 500; transition: background 0.2s; }
button:hover { background: #2563eb; }
button.red { background: var(--red); } button.red:hover { background: #dc2626; }
button.green { background: var(--green); } button.green:hover { background: #059669; }

/* Timeline Graph */
.timeline-container { position: relative; padding: 20px 0; display: flex; align-items: center; overflow-x: auto; min-height: 120px; }
.timeline-line { position: absolute; height: 4px; background: var(--surface2); width: 100%; top: 50%; transform: translateY(-50%); z-index: 1; border-radius: 2px;}
.node { position: relative; z-index: 2; width: 16px; height: 16px; border-radius: 50%; background: var(--primary); margin-right: 40px; cursor: pointer; border: 3px solid var(--surface); transition: transform 0.2s; flex-shrink: 0;}
.node:hover { transform: scale(1.5); }
.node.KS { background: var(--red); box-shadow: 0 0 12px rgba(239, 68, 68, 0.5); width: 20px; height: 20px;}
.node.ROLLBACK { background: var(--amber); }
.node-label { position: absolute; top: 25px; left: 50%; transform: translateX(-50%); font-size: 10px; color: var(--text2); white-space: nowrap; font-family: monospace;}
.node-seq { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); font-size: 11px; font-weight: 700; color: var(--text);}

/* Details & Diff */
.diff-metrics { display: grid; gap: 12px; margin-top: 16px; }
.metric { display: flex; justify-content: space-between; padding: 12px; background: var(--surface2); border-radius: 6px; font-size: 13px; }
.metric .val { font-weight: 600; font-family: monospace;}
.metric .val.green { color: var(--green); }
.metric .val.red { color: var(--red); }

/* Approvals */
.approval-list { display: flex; flex-direction: column; gap: 12px; }
.approval-item { background: var(--surface2); padding: 16px; border-radius: 8px; border-left: 4px solid var(--amber); }
.approval-item.COMMITTED { border-left-color: var(--green); }
.approval-item h4 { font-size: 13px; margin-bottom: 8px; }
.approval-item .meta { font-size: 12px; color: var(--text2); margin-bottom: 12px; }
.approval-actions { display: flex; gap: 8px; }

</style>
</head>
<body>

<div class="header">
    <h1>Temporal Control Tower V5</h1>
    <span style="font-family: monospace; color: var(--text3);">Risk OS Observability</span>
</div>

<div class="controls">
    <input type="text" id="hashInput" placeholder="Scenario Hash (e.g. TEST-HASH)" value="TEST-HASH" style="width: 300px;">
    <button onclick="loadTimeline()">Load Timeline</button>
</div>

<div class="bento">
    <!-- Left: Timeline -->
    <div style="display:flex; flex-direction: column; gap: 24px;">
        <div class="card">
            <h2>
                <span>Event Stream Simulator</span>
                <span id="seqMeta" style="color: var(--text3); font-weight: 400;">Target Seq: -</span>
            </h2>
            <div class="timeline-container" id="timelineGraph">
                <div class="timeline-line"></div>
                <div style="color: var(--text3); font-size: 13px; font-style: italic;">No stream loaded</div>
            </div>
            <div style="margin-top: 20px; text-align: right;">
                <input type="number" id="targetSeqInput" placeholder="Seq No" style="width: 80px; margin-right: 8px;">
                <button onclick="calculateDiff()">Simulate Diff</button>
                <button class="red" onclick="executeRollback()">Exe Rollback/KS</button>
            </div>
        </div>

        <div class="card">
            <h2>State Diff Engine</h2>
            <div id="diffView">
                <div style="color: var(--text3); font-size: 13px;">Run Simulator to see Diff</div>
            </div>
        </div>
    </div>

    <!-- Right: Approvals -->
    <div class="card">
        <h2>Active Pending Multi-Sig</h2>
        <div class="approval-list" id="approvalList">
            <div style="color: var(--text3); font-size: 13px;">No pending actions</div>
        </div>
    </div>
</div>

<script>
let currentTimeline = [];

async function apiCall(path, method = 'GET', body = null) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(`/api/v5/observability${path}`, opts);
    return res.json();
}

async function loadTimeline() {
    const hash = document.getElementById('hashInput').value;
    const data = await apiCall(`/timeline/${hash}`);
    
    if (data.error) {
        document.getElementById('timelineGraph').innerHTML = `<div class="timeline-line"></div><div style="color:var(--red);font-size:13px">${data.error}</div>`;
        return;
    }
    
    currentTimeline = data.events;
    document.getElementById('seqMeta').innerText = `Max Seq: ${data.max_sequence}`;
    document.getElementById('targetSeqInput').value = data.max_sequence;
    
    // Render Timeline
    const container = document.getElementById('timelineGraph');
    container.innerHTML = '<div class="timeline-line"></div>';
    
    data.events.forEach(e => {
        const node = document.createElement('div');
        const isKS = e.type === 'KILL_SWITCH_TRIGGERED' || e.type === 'KILL_SWITCH_EXECUTED';
        const isRB = e.type.includes('ROLLBACK');
        
        node.className = `node ${isKS ? 'KS' : ''} ${isRB ? 'ROLLBACK' : ''}`;
        node.onclick = () => { document.getElementById('targetSeqInput').value = e.sequence; calculateDiff(); };
        
        node.innerHTML = `
            <div class="node-seq">#${e.sequence}</div>
            <div class="node-label">${e.type.replace('_TRIGGERED','').replace('_EXECUTED','')}</div>
        `;
        container.appendChild(node);
    });

    renderApprovals(data.pending_approvals || []);
}

async function calculateDiff() {
    const hash = document.getElementById('hashInput').value;
    const seq = document.getElementById('targetSeqInput').value;
    const diffContainer = document.getElementById('diffView');
    
    diffContainer.innerHTML = 'Computing...';
    
    const data = await apiCall('/diff', 'POST', { scenario_hash: hash, until_sequence_no: parseInt(seq) });
    if (data.error) {
        diffContainer.innerHTML = `<span style="color:var(--red)">Error: ${data.error}</span>`;
        return;
    }

    diffContainer.innerHTML = `
        <div class="diff-metrics">
            <div class="metric">
                <span class="label">Time Travel Target</span>
                <span class="val">Seq #${data.target_sequence}</span>
            </div>
            <div class="metric">
                <span class="label">Events Invalidated</span>
                <span class="val ${data.metrics_diff.events_dropped > 0 ? 'red' : ''}">-${data.metrics_diff.events_dropped}</span>
            </div>
            <div class="metric">
                <span class="label">Recoverable</span>
                <span class="val ${data.metrics_diff.status === 'RECOVERABLE' ? 'green' : 'red'}">${data.metrics_diff.status}</span>
            </div>
        </div>
    `;
}

async function executeRollback() {
    const hash = document.getElementById('hashInput').value;
    const seq = document.getElementById('targetSeqInput').value;
    await apiCall('/execute', 'POST', { scenario_hash: hash, until_sequence_no: parseInt(seq), mode: 'commit' });
    loadTimeline();
}

async function signRequest(request_id, role) {
    await apiCall('/sign', 'POST', { request_id, actor: { role, user_id: `${role}-123`, org_id: 'GLOBAL' } });
    loadTimeline();
}

function renderApprovals(list) {
    const container = document.getElementById('approvalList');
    if (list.length === 0) {
        container.innerHTML = '<div style="color: var(--text3); font-size: 13px;">No pending actions</div>';
        return;
    }
    
    container.innerHTML = list.map(req => `
        <div class="approval-item ${req.status}">
            <h4>[${req.status}] ${req.target_action}</h4>
            <div class="meta">
                Signatures: ${req.signatures.length || 0} / ${req.required_signatures}<br>
                Target Hash: ${req.target_params?.scenario_hash || 'N/A'}
            </div>
            ${req.status === 'PENDING' ? `
                <div class="approval-actions">
                    <button class="green" style="font-size:11px;padding:6px 10px;" onclick="signRequest('${req.request_id}', 'risk_chair')">Sign (Risk Chair)</button>
                    <button class="green" style="font-size:11px;padding:6px 10px;" onclick="signRequest('${req.request_id}', 'cto')">Sign (CTO)</button>
                </div>
            ` : ''}
        </div>
    `).join('');
}
</script>
</body>
</html>
